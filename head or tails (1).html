<!DOCTYPE html>
<html>
  <head>
    <meta http-equiv="content-type" content="text/html; charset=utf-8" />
    <title>HEAD or TAILS</title>
    
    <style>
      body{
        background: linear-gradient(0deg,black);
        color:white;
        font-size: 20px;
        font-weight: bold;
        font-family: "impact", fantasy;
        text-align: center;
        margin-top: 100px;
        position: relative;
        
      }
     .but{
       height:100px;
       width:100px;
       border-radius:100px;
       border: none;
       background-color: transparent;
       color: white;
       font-weight: bold;
       position: relative;
        margin-right:20px;
        margin-left: 20px;
      
     }
     .img{
       height:100px;
       width:100px;
       top:0px;
       left: 0px;
       position:absolute;
      
     }
     .butt{
       height: 30px;
       width:100px;
       margin-top: 50px;
       border-radius:25px;
     }
     .res-im{
       height:40px;
       width: 40px;
       margin-top: 20px;
       bottom:0;
      
     }
    </style>
    
  </head>
  
  <body>
    
    <h1>HEAD or TAILS</h1>
    <button class="but" onclick="spin('HEAD');"><img src="/javacrashcourse/HEAD.png" class="img"/></button>
    <button class="but" onclick="spin('TAILS');"><img src="/javacrashcourse/TAILS.png" class="img"/></button>
    <p id="call"></p>
    <p id="res"></p>
    <p id="sco"></p>
    <button  id="buts" class="butt"  onclick="cleart();">RESET</button>
    
  </body>
  
  <script>
  
   let score={
     wins:0, 
     losses:0
   }
   
   function cleart()
   {
   let but=document.getElementById('buts').style.backgroundColor='cyan';
     
     if(score.wins===0 && score.losses===0) 
     {
       sco.innerText="Play Pantu Reset panu 😒";
     }
     
    else if(score.wins!=0 || score.losses!=0)
     {
       score.wins=0;
       score.losses=0;
       sco.innerText='wins:'+score.wins+' || losses:'+score.losses;   
       call.innerText="";
       res.innerText="";
     }
    
     }
    
    function spin(move)
    {
      let coin=Math.random();
      let cal="";
      let result="";
      //let toss="";
      if(coin<0.6)
      {
        cal='HEAD';
      }
      else
      {
        cal='TAILS';
      }
     if(cal==='HEAD')
      {
        if(move==='HEAD')
        {
          result='you win';
        }
        else 
        {
          result='you loose';
        }
      }
      else 
      {
        if(move==='HEAD')
        {
          result='you loose';
        }
        else 
        {
          result='you win';
        }
      }
      
      if(result==='you win')
      {
        score.wins+=1;
      }
      else if (result==='you loose')
      {
        score.losses+=1;
      }
    
      let res=document.getElementById('res').innerText=result;
      let sco=document.getElementById('sco').innerText="wins:"+score.wins+' || losses:'+score.losses;
        let call=document.getElementById('call').innerHTML=`you called:${move} ||  Toss:${cal}`;
    }
    
  </script>
</html>
