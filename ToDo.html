<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>To Do List</title>

<style>

body{
  font-family: Arial, Helvetica, sans-serif;
  background: linear-gradient(135deg,#4facfe,#00f2fe);
  display:flex;
  justify-content:center;
  align-items:flex-start;
  height:100vh;
  margin:0;
  padding-top:40px;
}

.container{
  background:white;
  padding:30px;
  border-radius:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
  width:420px;
}

h1{
  text-align:center;
  margin-bottom:25px;
  color:#333;
}

.inp{
  height:35px;
  padding:5px;
  border-radius:6px;
  border:1px solid #ccc;
  font-size:15px;
  width:100%;
  box-sizing:border-box;
}

.buts{
  height:37px;
  border:none;
  border-radius:6px;
  background:#28a745;
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

.buts:hover{
  background:#218838;
}

.but{
  height:35px;
  border:none;
  border-radius:6px;
  background:#dc3545;
  color:white;
  cursor:pointer;
  transition:0.3s;
}

.but:hover{
  background:#b52a37;
}

.can{
  margin-bottom:25px;
}

.box,.can{
  display:grid;
  grid-template-columns: 1fr 1fr 80px;
  grid-gap:15px;
  align-items:center;
}

.box div{
  background:#f5f7fa;
  padding:8px;
  border-radius:5px;
}

</style>

</head>

<body>

<div class="container">

<h1>📝 TO DO LIST</h1>

<div class="can">
  <input name="val" id="val" class="inp" placeholder="Enter Task">
  <input type="date" id="date" class="inp">
  <button class="buts" onclick="add()">ADD</button>
</div>

<div class="box" id="box"></div>

</div>

<script>

let Arr=[];
ins();

function add()
{
  let dates=document.getElementById("date");
  let date=dates.value;

  let vall=document.getElementById("val");
  let name=vall.value;

  Arr.push({name, date});

  vall.value="";
  dates.value='';

  ins();
}

function ins()
{
 let can="";

 Arr.forEach((todo,index)=>{

 let {name,date}=todo;

 let dis=`
 <div>${name}</div>
 <div>${date}</div>
 <button class="but"
 onclick="Arr.splice(${index},1); ins();">
 Delete
 </button>
 `;

 can+=dis;

 });

 document.getElementById('box').innerHTML=can;
}

</script>

</body>
</html>
